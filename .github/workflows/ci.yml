name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[superheavy]"

      - name: Run tests (Light + Heavy only — SuperHeavy skipped in CI)
        env:
          COINRANDOM_CI: "1"
          PYTHONIOENCODING: utf-8
        run: python tests/run_tests.py
