name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'

jobs:
  # Deterministic, network-free gate — runs on every supported Python.
  test:
    name: Offline tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[heavy,dev]"

      - name: Run offline tests
        run: pytest tests/ -q

  # Live integration smoke — hits real exchange/RPC endpoints, so an upstream
  # outage or geo-block must NOT block merges. Informational only.
  integration:
    name: Live smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[heavy]"

      - name: Run live suite (Heavy optimizer skipped)
        env:
          COINRANDOM_CI: "1"
          PYTHONIOENCODING: utf-8
        run: python tests/run_tests.py
